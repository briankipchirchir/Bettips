version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: bettips-postgres
    environment:
      POSTGRES_DB: bettips
      POSTGRES_USER: bettips
      POSTGRES_PASSWORD: bettips123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bettips"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bettips-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/bettips
      KC_DB_USERNAME: bettips
      KC_DB_PASSWORD: bettips123
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --http-port=8180

volumes:
  postgres_data:
