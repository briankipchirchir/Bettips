# Server
server.port=${PORT:8081}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Nairobi
spring.jpa.open-in-view=false

# Keycloak — live Render instance
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://smart-commerce-keycloak.onrender.com/realms/bettips
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://smart-commerce-keycloak.onrender.com/realms/bettips/protocol/openid-connect/certs

# Africa's Talking
africastalking.api-key=${AT_API_KEY}
africastalking.username=${AT_USERNAME}
africastalking.sender-id=${AT_SENDER_ID}

# Daraja
daraja.consumer-key=${DARAJA_CONSUMER_KEY}
daraja.consumer-secret=${DARAJA_CONSUMER_SECRET}
daraja.passkey=${DARAJA_PASSKEY}
daraja.shortcode=${DARAJA_SHORTCODE}
daraja.callback-url=${DARAJA_CALLBACK_URL}
daraja.base-url=https://sandbox.safaricom.co.ke

# CORS
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Actuator
management.endpoints.web.exposure.include=health,info
