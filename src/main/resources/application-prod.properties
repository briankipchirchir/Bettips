# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Nairobi
spring.jpa.open-in-view=false
spring.datasource.hikari.connection-timeout=30000
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Mobitech SMS
mobitech.api-key=${MOBITECH_API_KEY}
mobitech.sender-id=${MOBITECH_SENDER_ID}

# PayHero
payhero.api-username=${PAYHERO_API_USERNAME}
payhero.api-password=${PAYHERO_API_PASSWORD}
payhero.channel-id=${PAYHERO_CHANNEL_ID}
payhero.callback-url=${PAYHERO_CALLBACK_URL}

# CORS
cors.allowed-origins=${FRONTEND_URL:https://tips-ashy.vercel.app/}

# Actuator
management.endpoints.web.exposure.include=health,info


# Fix for stale connection / prepared statement bug
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# Disable prepared statement caching (fixes PostgreSQL plan cache mismatch)
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0


# Connection pool ? increase from 3 (too low for concurrent users)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# Hibernate batch inserts ? faster when saving multiple records
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Gzip compression ? reduces JSON payload ~70% (important for Kenyan mobile networks)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024

# Reduce cache logging in prod ? TRACE is too noisy
logging.level.org.springframework.cache=WARN
