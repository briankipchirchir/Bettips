# Server
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bettips
spring.datasource.username=bettips
spring.datasource.password=bettips123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Keycloak / OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bettips
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bettips/protocol/openid-connect/certs

# Africa's Talking
africastalking.api-key=your_api_key_here
africastalking.username=sandbox
africastalking.sender-id=BetTips

# Daraja M-Pesa
daraja.consumer-key=your_consumer_key_here
daraja.consumer-secret=your_consumer_secret_here
daraja.passkey=your_passkey_here
daraja.shortcode=174379
daraja.callback-url=https://your-domain.com/api/payments/mpesa/callback
daraja.base-url=https://sandbox.safaricom.co.ke

# CORS
cors.allowed-origins=http://localhost:5173

# Actuator
management.endpoints.web.exposure.include=health,info
